<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="ICO1mNcETyYFTwH_uYDtXio0dIfj7yKhSQx05h61uNA" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral News India | Latest Updates</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="ad-wrapper top-ad-area">
        <p class="ad-label">Advertisement</p>
        <div class="ad-placeholder">
            <img src="https://via.placeholder.com/728x90?text=Responsive+Banner+Ad" alt="Ad">
        </div>
    </div>

    <header>
        <div class="header-container">
            <div class="logo">Viral News India</div>
            <nav class="main-nav">
                <a href="#" onclick="fetchNews('india')">India</a>
                <a href="#" onclick="fetchNews('trading')">Trading</a>
                <a href="#" onclick="fetchNews('cricket')">Cricket</a>
                <a href="#" onclick="fetchNews('entertainment')">Entertainment</a>
            </nav>
        </div>
    </header>

    <div class="main-wrapper">
        <aside class="sidebar left-sidebar">
            <div class="sticky-ad">
                <p class="ad-label">AD</p>
                <img src="https://via.placeholder.com/160x600?text=Vertical+Ad" alt="Ad">
            </div>
        </aside>

        <main class="content-area">
            <h2 id="category-title">Latest Updates</h2>
            <div id="news-grid">
                <div class="loading">Fresh news load ho rahi hai...</div>
            </div>
        </main>

        <aside class="sidebar right-sidebar">
            <div class="ad-wrapper square-ad">
                <p class="ad-label">AD</p>
                <img src="https://via.placeholder.com/300x250?text=Square+Ad" alt="Ad">
            </div>
            
            <div class="trending-section">
                <h3>Trending Now</h3>
                <div id="trending-list"></div>
            </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
